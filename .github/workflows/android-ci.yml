name: Android CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'core/**'
      - '**/*.kt'
      - '**/*.kts'
      - '**/*.gradle'
      - '**/gradle.properties'
      - '**/gradle-wrapper.properties'
      - 'gradle/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Permission for Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew assembleDebug --parallel --build-cache
